<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us — DogWoodAI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body data-popup="off">
<div id="site-header"></div>

<section class="page-hero">
  <div class="container">
    <div class="breadcrumb"><a href="index.html">Home</a><span class="sep">/</span><span data-i18n="contact.bc"></span></div>
    <h1 data-i18n="contact.h1"></h1>
    <p data-i18n="contact.sub"></p>
  </div>
</section>

<section class="section">
  <div class="container">
    <div class="contact-wrap">
      <div class="contact-info reveal">
        <h2 class="h-md" data-i18n="contact.info.t" style="margin-bottom:10px"></h2>
        <div class="ci-item">
          <span class="ci-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s-7-6.5-7-11a7 7 0 0 1 14 0c0 4.5-7 11-7 11Z"/><circle cx="12" cy="10" r="2.4"/></svg></span>
          <div><b data-i18n="contact.addr.l"></b><span data-i18n="contact.addr.v"></span></div>
        </div>
        <div class="ci-item">
          <span class="ci-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3-8.7A2 2 0 0 1 4.1 2H7a2 2 0 0 1 2 1.7c.1 1 .4 1.9.7 2.8a2 2 0 0 1-.5 2.1L8 9.9a16 16 0 0 0 6 6l1.3-1.3a2 2 0 0 1 2.1-.4c.9.3 1.8.5 2.8.6a2 2 0 0 1 1.8 2.1Z"/></svg></span>
          <div><b data-i18n="contact.phone.l"></b><span>+82 10 6278 0184</span></div>
        </div>
        <div class="ci-item">
          <span class="ci-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 6 10-6"/></svg></span>
          <div><b data-i18n="contact.email.l"></b><span>dogwoodai@dogwoodai.com</span></div>
        </div>
        <div class="map-box">
          <div class="pin"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s-7-6.5-7-11a7 7 0 0 1 14 0c0 4.5-7 11-7 11Z"/><circle cx="12" cy="10" r="2.4"/></svg><div data-i18n="contact.map"></div></div>
        </div>
      </div>

      <form class="contact-form reveal d1" id="contactForm">
        <h2 class="h-md" data-i18n="contact.form.t" style="margin-bottom:22px"></h2>
        <div class="form-row">
          <div class="field"><label data-i18n="contact.f.name"></label><input type="text" data-i18n-ph="contact.f.name.ph" required></div>
          <div class="field"><label data-i18n="contact.f.company"></label><input type="text" data-i18n-ph="contact.f.company.ph"></div>
        </div>
        <div class="form-row">
          <div class="field"><label data-i18n="contact.f.email"></label><input type="email" data-i18n-ph="contact.f.email.ph" required></div>
          <div class="field"><label data-i18n="contact.f.phone"></label><input type="tel" data-i18n-ph="contact.f.phone.ph"></div>
        </div>
        <div class="field">
          <label data-i18n="contact.f.msg"></label>
          <textarea maxlength="500" data-i18n-ph="contact.f.msg.ph" required></textarea>
          <div class="char-count">0 / 500</div>
        </div>
        <label class="consent"><input type="checkbox" required><span data-i18n="contact.consent"></span></label>
        <button type="submit" class="btn btn-primary btn-lg" style="width:100%;justify-content:center" data-i18n="contact.submit"></button>
        <p class="form-note" data-i18n="contact.note"></p>
      </form>
    </div>
  </div>
</section>

<div id="site-footer"></div>
<script src="js/translations.js"></script>
<script src="js/app.js"></script>
</body>
</html>
