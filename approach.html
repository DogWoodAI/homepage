<body data-popup="off">
<div id="site-header"></div>

<section class="page-hero"><div class="container"><h1 data-i18n="nav.approach"></h1></div></section>

<div class="container">
  <p class="intro-quote reveal" data-i18n="ap.intro"></p>
  <div id="apList"></div>
</div>

<div id="site-footer"></div>
<script src="js/translations.js"></script>
<script src="js/page-data.js"></script>
<script>
(function(){
  function li(key){ return '<li data-i18n="'+key+'"></li>'; }
  function caseBlock(s){
    if(s.k === "apg2" || s.k === "apg4") return "";
    return '<span class="uh" data-i18n="g.case"></span>'+
      '<p data-i18n="'+s.k+'.case"></p>';
  }
  function render(data){
    document.getElementById("apList").innerHTML = data.sections.map(function(s){
      var stacked = s.id === "tailor-made" ? "" : " detail--stacked";
      return '<section class="detail'+stacked+' anchor-sec" id="'+s.id+'">'+
        '<div class="d-txt reveal">'+
          '<h2 data-i18n="'+s.h+'"></h2>'+
          '<span class="uh" data-i18n="g.about"></span>'+
          '<p data-i18n="'+s.k+'.about"></p>'+
          '<span class="uh" data-i18n="g.features"></span>'+
          '<ul class="dash-list">'+li(s.k+'.f1')+li(s.k+'.f2')+li(s.k+'.f3')+'</ul>'+
          '<span class="uh" data-i18n="g.benefits"></span>'+
          '<ul class="dash-list">'+li(s.k+'.b1')+li(s.k+'.b2')+li(s.k+'.b3')+'</ul>'+
          caseBlock(s)+
        '</div>'+
        '<figure class="d-fig reveal d1">'+
          '<div class="frame"><img src="assets/approach/'+s.img+'" alt="" width="'+s.size[0]+'" height="'+s.size[1]+'" loading="lazy"></div>'+
          '<figcaption data-i18n="'+s.k+'.cap"></figcaption>'+
        '</figure>'+
      '</section>';
    }).join("");
  }
  PageData.load("data/approach.json", render);
})();
</script>
<script src="js/app.js"></script>
</body>
