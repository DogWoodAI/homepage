/* build the 4 sections */
(function(){
  var S = [
    {id:"tailor-made",  h:"nav.ap1", k:"apg1", img:"001.jpg"},
    {id:"real-data",    h:"nav.ap2", k:"apg2", img:"002.jpg"},
    {id:"model-based",  h:"nav.ap3", k:"apg3", img:"003.jpg"},
    {id:"physics-based",h:"nav.ap4", k:"apg4", img:"004.jpg"}
  ];
  function li(key){ return '<li data-i18n="'+key+'"></li>'; }
  function caseBlock(s){
    if(s.k === "apg2" || s.k === "apg4") return "";
    return '<span class="uh" data-i18n="g.case"></span>'+
      '<p data-i18n="'+s.k+'.case"></p>';
  }
  document.getElementById("apList").innerHTML = S.map(function(s){
    var stacked = s.id === "tailor-made" ? "" : " detail--stacked";
    return '<section class="detail'+stacked+' anchor-sec" id="'+s.id+'">'+
      '<div class="d-txt reveal">'+
        '<h2 data-i18n="'+s.h+'"></h2>'+
        '<span class="uh" data-i18n="g.about"></span>'+
        '<p data-i18n="'+s.k+'.about"></p>'+
        '<span class="uh" data-i18n="g.features"></span>'+
        '<ul class="dash-list">'+li(s.k+'.f1')+li(s.k+'.f2')+li(s.k+'.f3')+'</ul>'+
        '<span class="uh" data-i18n="g.benefits"></span>'+
        '<ul class="dash-list">'+li(s.k+'.b1')+li(s.k+'.b2')+li(s.k+'.b3')+'</ul>'+
        caseBlock(s)+
      '</div>'+
      '<figure class="d-fig reveal d1">'+
        '<div class="frame"><img src="assets/software/'+s.img+'" alt="" loading="lazy"></div>'+
        '<figcaption data-i18n="'+s.k+'.cap"></figcaption>'+
      '</figure>'+
    '</section>';
  }).join("");
})();
