<style>
.figcap-u{text-align:center;font-size:.85rem;font-weight:600;color:#1f2937;margin-top:13px}
/* images render at natural size, centered inside the full-width frame (like the original) */
#rdList .diagram{padding:18px 12px}
#rdList .diagram img{width:auto;max-width:100%;margin:0 auto}
/* side layout (text left, figure right) used by select sections */
.rd-side{display:grid;grid-template-columns:1.06fr .94fr;gap:52px;align-items:start}
.rd-side .diagram{margin-top:8px;padding:16px}
.rd-side .diagram img{width:100%}
@media(max-width:900px){.rd-side{grid-template-columns:1fr;gap:26px}}
#rdList .mod p.rd-p{margin-top:14px;color:#374151;font-size:clamp(1.08rem,1.18vw,1.16rem);line-height:1.92}
#rdList .mod h2{font-size:clamp(1.2rem,1.9vw,1.5rem);line-height:1.45}
</style>

<body data-popup="off">
<div id="site-header"></div>

<section class="page-hero"><div class="container"><h1 data-i18n="nav.rndd"></h1></div></section>

<div class="container">
  <div id="rdList"></div>
</div>

<div id="site-footer"></div>
<script src="js/translations.js"></script>
<script src="js/page-data.js"></script>
<script>
(function(){
  function render(data){
    var side = {};
    (data.sideSections || []).forEach(function(n){ side[n] = true; });
    var hashMatch = location.hash.match(/^#rdd-(\d+)$/);
    var hashTarget = hashMatch ? parseInt(hashMatch[1], 10) : 0;
    var html = "";
    var total = Object.keys(data.sizes || {}).length;
    for(var i=1;i<=total;i++){
      var n = (i<10?"0":"")+i;
      var size = data.sizes[n];
      var loading = hashTarget && i <= hashTarget ? "eager" : "lazy";
      var fig = '<div>'+
        '<div class="diagram reveal d1"><img src="assets/rndd/'+n+'.jpg" alt="" width="'+size[0]+'" height="'+size[1]+'" style="aspect-ratio:'+size[0]+'/'+size[1]+'" loading="'+loading+'"></div>'+
        '<p class="figcap-u" data-i18n="rd'+i+'.c"></p>'+
      '</div>';
      if(side[i]){
        html += '<section class="mod anchor-sec" id="rdd-'+i+'"><div class="rd-side">'+
          '<div class="reveal"><h2 data-i18n="rd'+i+'.t"></h2><p class="rd-p" data-i18n="rd'+i+'.p"></p></div>'+fig+
        '</div></section>';
      }else{
        html += '<section class="mod anchor-sec" id="rdd-'+i+'">'+
          '<h2 class="reveal" data-i18n="rd'+i+'.t"></h2>'+
          '<p class="rd-p reveal" data-i18n="rd'+i+'.p"></p>'+fig+
        '</section>';
      }
    }
    document.getElementById("rdList").innerHTML = html;
  }
  PageData.load("data/rndd.json", render);
})();
</script>
<script src="js/app.js"></script>
</body>
