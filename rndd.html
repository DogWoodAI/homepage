Object.assign(window.I18N.en, {
  "rd1.t":"Comparative performance and machine learning-based optimization of TSA configurations for NH₃ removal from NH₃ cracking gas",
  "rd1.p":"In the quest to reduce ammonia (NH₃) levels in H₂ fuel cell applications to below 0.1 ppm, we've pioneered novel three-bed temperature swing adsorption (TSA) configurations using zeolite and harnessed AI for optimization. We evaluated various TSA setups, with the TSA-TGER configuration proving most efficient in techno-economic comparisons, using H₂ pressure swing adsorption tail gas for cooling and NH₃ TSA off-gas for heating. AI models facilitated precise predictions with a significant reduction in computational costs. This approach reduced NH₃ removal costs to just 0.98% of overall H₂ production costs, making it a promising solution for effective NH₃ removal in NH₃ cracking gases.",
  "rd1.c":"TSA configurations for NH₃ removal from NH₃ cracking gas, performance of AI model and scatter profiles for optimization of the main operating variables",
  "rd2.t":"Dynamic model-driven AI for H₂ recovery and CO₂ capture from hydrogen tail gas",
  "rd2.p":"We've pioneered an integrated process for H₂ recovery and CO₂ capture from hydrogen plant tail gases. This process, consisting of front and rear sectors, has been validated and optimized using a dynamic model and an AI. The outcome showcases cost-effective H₂ recovery and efficient CO₂ capture, providing a bridge between energy research gaps and sustainability. The developed AI precisely predicts system behavior at a low computational cost. Additionally, a differential evolution approach optimizes operational conditions. This methodology can be validated with reference data for a hybrid cryogenic-membrane process, ultimately determining cost and energy efficiency.",
  "rd2.c":"Configuration of the integrated process for H₂ recovery and CO₂ capture from the tail gas of a H₂ SMR plant, and evaluation using AI model",
  "rd3.t":"Deep reinforcement learning optimization framework for a power generation plant considering performance and environmental issues",
  "rd3.p":"Achieving a balance between power production and emission limits is a complex task in the electric power generation sector. A deep reinforcement learning optimization framework (DRLOF) was developed for a circulating fluidized bed (CFB) power plant. The DRLOF utilized plant data to create an environment and interacts with an advantage actor-critic (A2C) agent. The framework maximized power generation while adhering to capacity constraints and environmental emission standards, considering the cost of operations. The separate-A2CN architecture achieved an increase in electricity generation and emission reduction with lower computational cost. The DRLOF demonstrated flexibility, adaptability, and lower computational burden through different test scenarios. This approach has implications beyond the CFB power plant, extending to other chemical processes and industries. The model contributes to optimization challenges, customization needs, and cost reduction in online operations. The solution was provided to an electrical power company.",
  "rd3.c":"A2C architecture to maximize the power generation and reduce NOx in CFB power plant",
  "rd4.t":"CO₂ capture capability of 0.5 MW MEA demo plant using deep learning pipelines",
  "rd4.p":"Three AI pipelines (S-DLP, SBE-DLP, and L-DLP) were developed to predict the CO₂ capture potential of amine-based capture processes. Real operating data from a 0.5 MW MEA demo plant were utilized for data cleaning, feature selection, and AI-driven prediction. After eliminating outliers, the best pipeline was selected, providing accurate predictions of CO₂ capture rate and concentration. Furthermore, the selected pipeline was used to predict temperature variation in the absorber and stripper, crucial for energy saving. The developed pipeline demonstrated its potential for accurate and efficient prediction of CO₂ capture in chemical processes.",
  "rd4.c":"Configuration of CO₂ capture process and the performance comparison of each pipelines",
  "rd5.t":"Techno-economic analysis and optimization using AI model for a CO₂ absorption process using an MDEA/PZ solvent with a solvent looping system for steam methane reforming",
  "rd5.p":"AI model was developed for a pre-combustion CO₂ absorption process utilizing a solvent looping system with a blended MDEA/PZ solvent. The novel solvent looping system operated by recycling a portion of the solvent from a flash drum, thereby reducing energy consumption and the size of the stripper. AI models were utilized to accurately predict capital and operating costs. A multi-variable mutation approach using AI models was employed to optimize the operating conditions and minimize the CO₂ capture cost, and the solution was provided to an oil company.",
  "rd5.c":"Prediction accuracy and optimal operating conditions using AI for CO₂ absorption process",
  "rd6.t":"Actor-critic reinforcement learning using the AI model to determine the optimal operating conditions of the hydrocracking process",
  "rd6.p":"An actor-critic reinforcement learning (RL) optimization strategy using AI surrogate model was developed for optimizing the operating conditions of hydrocracking units because traditional mathematical models for optimization are costly and may not be suitable for the quick response and customization needs of hydrocracking units. The AI surrogate model, built from a validated mathematical model, provides accurate predictions with minimal computational resources. The proposed RL framework achieved an accuracy of 97.86% to 98.5% in determining optimal operating conditions, demonstrating consistency and an average efficiency of 98% in case studies. The approach offers advantages such as quick response time, low computational burden, and customizability, making it practical for online implementation. This strategy can be extended beyond hydrocracking to other chemical industries, presenting a novel and valuable optimization solution.",
  "rd6.c":"Hydrocracking process Reinforcement Learning Optimization",
  "rd7.t":"Integrating mathematical modelling and machine learning for steam methane reformer in the chemical industry",
  "rd7.p":"The steam methane reformer (SMR) plays a crucial role in hydrogen production using natural gas, making it attractive to the chemical industry. A combined approach using mathematical modeling and AI was developed to enhance SMR performance. A rigorous dynamic model for the SMR was developed and validated, demonstrating its reliability in predicting temperature, pressure, mole fraction, and heat flux. The model was then used to generate performance data by varying catalyst parameters and operating conditions. The dataset was analyzed using principle components, and an AI was trained to accurately map the relationship between operating variables and predicted outputs. The AI achieved high accuracy with significantly reduced computational time compared to dynamic simulations. This methodology enables online operation, optimization, and system design for hydrogen production at low computational cost, making it valuable to the industry.",
  "rd7.c":"Comparison of dynamic model and AI model results for SMR Process",
  "rd8.t":"AI optimization for low-carbon H₂ production via a sorption-enhanced steam methane reforming (SESMR) process integrated with separation process",
  "rd8.p":"The AI model was developed for an SESMR process integrated with a separation process for low-carbon H₂ production. The development aims to simplify optimization and control, provide guidance for sorbent-catalyst development, and leverage the potential of AI for accurate prediction. The integrated process consists of cyclic fluidized bed (CFB), pressure swing adsorption (PSA), and other units. Sensitivity analysis and feature selection were performed to identify main objectives and variables. An AI-driven optimization approach was developed to formulate a SESMR-driven model, resulting in a 15% cost reduction for high purity H₂ production and CO₂ capture compared to the traditional steam methane reforming process. The findings contribute to the operation, optimization, and control of integrated SESMR processes and have implications for sorbent and catalyst development in complex processes.",
  "rd8.c":"AI-driven SESMR process optimization and its results",
  "rd9.t":"AI model of commercial scale SMB for multi-component n-paraffin separation",
  "rd9.p":"The ML model was developed for the analysis and improvement of simulated moving bed chromatography (SMB) for the separation of a multi-component mixture of C10-14 normal paraffins from kerosene. To address the complexities of feed composition and operational variables, a mathematical dynamic model was used alongside data-driven AI methods, which employed real industrial data, to evaluate SMB performance. Analysis results provided that optimizing the countercurrent ratio in different zones could enhance recovery, and new operating strategy was highlighted for effective impurity removal. The complementary use of mathematical and data-driven models was recommended due to the limitations of available experimental data. Furthermore, an exergy analysis in the overall SMB process provided potential improvements for SMB. The results contribute to the development of design and operation guidelines for improving SMB performance in a fine chemical company.",
  "rd9.c":"Configuration of n-paraffin SMB adsorption chambers and scatter plot of the predicted impurities",
  "rd10.t":"Design guideline for CO₂ to methanol conversion process supported by generic model of various bed reactors",
  "rd10.p":"A novel reactor design guideline for the CO₂ to methanol (CTM) conversion process was introduced by developing a generic model. The analysis encompassed commercially viable Bed Reactors (BRs), and the various optimal operating conditions were determined. Different BRs had different optimal conditions, and the overall CTM process demonstrated minimum cost at specific reactor pressure and temperature values. Developed guidelines offer practical applications for CTM process design, operation, and decision-making, and the BR models can contribute to other CO₂ utilization processes.",
  "rd10.c":"Proper reactor selection zone for CTM process design vs. CO₂ feed rate from the highest to lowest material costs.",
  "rd11.t":"A novel process for wet CO₂ to methanol using a catalytic fluidized bed reactor integrated with separators",
  "rd11.p":"This AI model and optimizer were developed for an advanced process to convert wet CO₂ into methanol using a catalytic fluidized bed reactor integrated with separators. With the increasing demand for large-scale green processes to neutralize carbon emissions, this model offers an attractive solution. An AI model could optimize the process, accurately predicting performance and significantly reducing computational costs.",
  "rd11.c":"Optimization of the operating conditions using AI for SMR process",
  "rd12.t":"AI-driven surrogate model for dynamic behaviors and performance of solid propellant combustion",
  "rd12.p":"The development focuses on predicting the dynamic behavior and performance of solid propellant combustion using a mathematical model and AI surrogate model. The rigorous mathematical model has limited practicality due to its computational complexity. The AI surrogate model was developed to address this limitation, accurately and quickly predicting combustion dynamic behaviors. The surrogate model outperformed dynamic simulations in terms of computational rate, being hundreds of times faster. The results were provided to a defense-related company.",
  "rd12.c":"Results of dynamic behavior of solid propellant combustion using surrogate model",
  "rd13.t":"Advanced cartridge design using CFD for a gas respiratory protection system",
  "rd13.p":"Gas masks play a vital role in safeguarding individuals from hazardous materials, necessitating the development of advanced cartridges for next-generation gas respirators. The CFD model was validated using a prototype cartridge, and the respiration resistance and breakthrough time were compared for the three designs. A virtual reality (VR) system was also employed to observe the cartridges' performance visually. The CFD model contributes to developing and optimizing gas respirator cartridges, enhancing wearability, protection, and overall design efficiency.",
  "rd13.c":"Shape and geometry of gas cartridges and gas flow observed in VR",
  "rd14.t":"Advanced process integration and machine learning-based optimization to enhance techno-economic-environmental performance of CO₂ capture and conversion to methanol",
  "rd14.p":"An integrated CO₂ capture and methanol conversion process (CCTM) enhanced by AI-driven optimization achieves significant improvements in energy consumption, production cost, and CO₂ reduction. Advanced design reuses waste heat, off-gas, and water, improving energy efficiency by 14.73-16.30%, reducing production costs by 0.81-1.28%, and increasing net CO₂ reduction by 3.13-3.38%. An AI model optimized the process, achieving a 92.53% CO₂ capture rate and an 8.21 $/tMeOH reduction in production cost. This approach offers a viable, sustainable solution for carbon neutrality in methanol production.",
  "rd14.c":"AI-driven optimization for a methanol conversion process with advanced CO₂ capture",
  "rd15.t":"Blended-amine CO₂ capture process without stripper for high-pressure syngas",
  "rd15.p":"The paper presents a novel CO₂ capture process using a blended MDEA/PZ solvent without a traditional stripper for high-pressure syngas. The process replaces the stripper with a low-pressure flash column, allowing solvent regeneration at lower temperatures (<373.15 K) and reducing energy consumption. Optimization method with AI model resulted in a heat duty of 1.881 GJ/ton CO₂, significantly lower than conventional methods. Economic analysis showed that with waste heat recovery, the process costs $32.89/ton CO₂, emphasizing its potential for cost-effective CO₂ capture in hydrogen production.",
  "rd15.c":"AI-driven optimization for blended amine CO₂ capture process",
  "rd16.t":"Pre-combustion CO₂ capture using amine-based absorption process for blue H₂ production from steam methane reformer",
  "rd16.p":"A novel pre-combustion CO₂ capture process using MDEA/PZ solvent for blue H₂ production from steam methane reformer (SMR) is developed. Sensitivity analysis and AI-driven optimization were performed, showing significant energy savings with reboiler duties of 1.318 and 1.364 GJ/tonCO₂ for 90% and 95% CO₂ removal efficiencies, respectively. AI optimization further reduced equivalent work by 0.3%. The process demonstrates over 40% lower energy consumption than traditional post-combustion methods, making it highly competitive for industrial applications, particularly beneficial for H₂ recovery without additional compression energy. The results were provided to a petrochemical company.",
  "rd16.c":"Amine-based absorption process for CO₂ capture in SMR syngas & Profiles for optimization of operating parameters at 90%",
  "rd17.t":"Prediction of CO₂ solubility in multicomponent electrolyte solutions up to 709 bar: Analogical bridge between hydrophobic solvation and adsorption model",
  "rd17.p":"A novel model predicting CO₂ solubility in multicomponent electrolyte solutions up to 709 bar was developed using an analogy between hydrophobic solvation and an ideal adsorption model. The model, which uses just four parameters, accurately predicts CO₂ solubility in solutions with various ions (e.g., Na+, Ca2+, Mg2+, K+, SO4²−, Cl−) by correlating CO₂ pressure, system temperature, and concentration of electrostricted water molecules. With 1384 experimental data points for validation, the model achieved a 95% prediction accuracy, offering significant utility for industrial CO₂ applications.",
  "rd17.c":"Experimental data vs model predictions of CO₂ solubility",
  "rd18.t":"Industrial-scale 12-layered-bed vacuum pressure swing adsorption for fuel cell-grade H₂ production from steam methane reforming syngas",
  "rd18.p":"12-layered-bed vacuum pressure swing adsorption (VPSA) used in industries is developed to produce fuel cell-grade H₂ from carbon-captured steam methane reforming syngas. Using validated dynamic simulations by industrial data, the surrogate model was developed to predict hydrogen purity, recovery, and CO concentration, effectively managing the intricate interactions across 12 beds and 24 operational steps. The AI models were integrated with the solution for multi-objective optimization, identifying the optimal operating conditions to maximize purity and recovery. The three-stage strategy for developing AI solution demonstrates a robust and systematic approach to designing and optimizing VPSA processes in SMR plants with carbon capture, ultimately contributing to a sustainable low-carbon economy. The results were provided to an oil company.",
  "rd18.c":"12-layered-bed VPSA for fuel cell-grade H₂ production and surrogate model-based optimization",
  "rd19.t":"Hybrid process using cryogenic and pressure swing adsorption process for CO₂ capture and H₂ production",
  "rd19.p":"Cryogenic distillation with a two-stage pressure swing adsorption system was developed for effective CO₂ capture and additional H₂ production from the tail gas of an SMR plant. AI models were constructed for rapid performance evaluation under various operating conditions. The multi-AI models were then integrated with a multi-objective optimization approach—incorporating constraints of a CO₂ capture rate exceeding 90% and fuel-cell grade H₂ purity of at least 99.999% (with ≤0.2 ppm CO) to minimize separation costs. The AI solution provided the information needed for techno-economic analysis: the hybrid process can achieve competitive H₂ separation cost and CO₂ capture cost, with further reductions possible when factoring in extra blue hydrogen production. The results were provided to an oil company.",
  "rd19.c":"AI-driven optimization for the hybrid process"
});
Object.assign(window.I18N.ko, {
  "rd1.t":"NH₃ 분해 가스로부터 NH₃를 제거하기 위한 TSA 공정 성능 비교 및 AI 기반 최적화",
  "rd1.p":"H₂ 연료전지 응용 분야에서 NH₃ 농도를 0.1 ppm 미만으로 저감하기 위해 제올라이트를 활용한 온도 스윙 흡착(TSA) 공정을 개발하고, AI를 활용하여 공정 최적화를 수행했습니다. 다양한 TSA 구성을 평가한 결과, H₂ 압력 스윙 흡착(PSA) 테일 가스를 냉각에 활용하고 NH₃ TSA 오프가스를 가열에 사용하는 TSA-TGER 구성이 기술 및 경제성 평가에서 가장 효율적임을 입증하였습니다. AI 모델을 적용함으로써 계산 비용을 현저히 절감하고 정확한 예측이 가능하였습니다. 이러한 접근법은 NH₃ 제거 비용을 전체 H₂ 생산 비용의 0.98%까지 낮추어, NH₃ 크래킹 가스 처리 분야에서 매우 유망한 솔루션으로 평가됩니다.",
  "rd1.c":"NH₃ 분해 가스로부터 NH₃ 제거를 위한 TSA 구성, AI 모델의 성능 및 주요 운전 변수 최적화를 위한 산점도",
  "rd2.t":"H₂ 테일 가스로부터 H₂ 회수 및 CO₂ 포집을 위한 동적 모델 기반 AI 솔루션",
  "rd2.p":"H₂ 공장 테일 가스로부터 H₂ 회수 및 CO₂ 포집을 위한 통합 공정을 개발하였습니다. 해당 공정은 전방 및 후방 섹터로 구성되며, 동적 모델과 AI 모델을 활용하여 철저한 검증 및 최적화되었습니다. 이를 통해 비용 효율적인 H₂ 회수와 효과적인 CO₂ 포집을 동시에 달성함으로써, 에너지 효율 향상과 지속 가능성을 동시에 만족하는 혁신적인 솔루션을 제안하였습니다. 특히, 개발된 AI는 낮은 계산 비용으로 공정 시스템의 동적 거동을 정밀하게 예측하며, 미분 진화 알고리즘을 적용하여 최적 운전 조건을 도출하였습니다. 본 방법론은 하이브리드 극저온-막 공정의 참조 데이터를 통해 신뢰성 이 검증되어, 비용 절감과 에너지 효율 최적화 측면에서 그 효과를 입증하였습니다. 개발 기술은 관련 정유사에 제공되었습니다.",
  "rd2.c":"H₂ SMR 공장의 테일 가스로부터 추가 H₂ 회수 및 CO₂ 포집 통합 공정 구성과 AI 모델을 통한 성능분석",
  "rd3.t":"성능 및 환경 문제를 고려한 발전소용 심층 강화 학습 최적화 프레임워크",
  "rd3.p":"전력 생산과 배출 한계 간의 균형을 잡는 것은 전력 발전 분야에서 복잡한 과제입니다. 순환 유동층(CFB) 발전소를 위한 심층 강화 학습 최적화 프레임워크(DRLOF)가 개발되었습니다. DRLOF는 발전소 데이터를 활용하여 환경을 조성하고 액터-크리틱(A2C) 에이전트와 상호 작용합니다. 프레임워크는 운전 비용을 고려하여 용량 제한 및 환경 배출 기준을 준수하면서 발전을 극대화했습니다. 분리형 A2CN 아키텍처는 더 낮은 계산 비용으로 전력 생산 및 배출 감소를 증가시켰습니다. DRLOF는 다양한 테스트 시나리오를 통해 유연성, 적응성 및 낮은 계산 부담을 입증했습니다. 이 접근 방식은 CFB 발전소를 넘어 다른 화학 공정 및 산업으로의 확장이 가능하며, 온라인 운전 최적화, 수요 예측 및 비용 절감에 기여할 수 있습니다. 개발 기술은 관련 발전사에 제공되었습니다.",
  "rd3.c":"CFB 발전소의 발전량 극대화와 NOx 저감을 위한 A2C 아키텍처",
  "rd4.t":"AI 파이프라인을 활용한 0.5 MW급 MEA 실증 공장의 CO₂ 포집 성능 평가",
  "rd4.p":"아민 기반 포집 공정을 통한 CO₂ 포집 가능성을 예측하기 위해 3개의 AI 파이프라인(S-DLP, SBE-DLP, L-DLP)을 개발했습니다. 0.5 MW급 MEA 시범공장의 실제 운영 데이터는 데이터 클리닝, 피처(feature) 선택 및 심층 신경망 기반 예측에 활용되었습니다. 이상치를 제거한 후, CO₂ 포집율 및 농도에 대한 정확한 예측을 제공하는 최고의 파이프라인을 선정하여, 에너지 절감에 중요한 흡착체 및 탈거 인자의 온도 변화를 예측하는 데 사용되었습니다. 개발된 파이프라인은 화학 공정에서 CO₂ 포집을 정확하고 효율적으로 예측할 수 있다는 것을 입증했습니다.",
  "rd4.c":"CO₂ 포집 공정 구성 및 각 파이프라인의 성능 비교",
  "rd5.t":"AI 모델 기반 기술경제성 분석 및 스팀 메탄 개질(SMR) 공정을 위한 MDEA/PZ 용매 루핑 시스템의 CO₂ 흡수 공정 최적화",
  "rd5.p":"혼합된 MDEA/PZ 용매를 이용한 용매 루핑 시스템을 통해 연소 전 CO₂ 흡수 공정을 위한 AI모델이 개발되었습니다. 새로운 용매 루핑 시스템은 플래시 드럼에서 용매의 일부를 재활용하여 작동함으로써 에너지 소모량과 탈거 인자의 크기를 줄였습니다. AI 모델은 자본 및 운영 비용을 정확하게 예측하기 위해 활용되었습니다. 운전 조건 최적화와 CO₂ 포집 비용을 최소화하기 위해 AI 모델을 이용한 다변수 변이 접근법을 개발하였습니다. 개발 기술은 관련 정유사에 제공되었습니다.",
  "rd5.c":"AI 기반 CO₂ 흡수 공정의 예측 정확도 및 최적 운전 조건",
  "rd6.t":"수소화 분해공정의 최적 운전 조건을 결정하기 위한 AI 모델을 이용한 액터-크리틱 강화학습",
  "rd6.p":"기존의 전통적인 수학적 최적화 모델은 계산 비용이 크고 수소화 분해 공정의 빠른 대응 속도 및 맞춤형 운영 조건 설정에 적합하지 않기 때문에, 최적 운전 조건 도출을 위한 AI 기반 액터-크리틱(actor-critic) 강화학습(RL) 최적화 프레임워크를 개발하였습니다. AI 모델은 이미 검증된 수학적 모델을 기반하기 때문에 최소한의 계산 자원으로 높은 예측 정확성을 제공합니다. 개발된 강화학습 프레임워크는 최적 운전 조건 결정 시 97.86%~98.5%의 정확도를 달성하였으며, 사례 연구에서 일관성 및 평균 98%의 높은 효율성을 입증했습니다. 이 방법론은 신속한 응답성, 낮은 계산 부담 및 개별 공정 특성에 맞춘 사용자 맞춤형 운영 설정이 가능하다는 장점이 있어 실시간 온라인 적용에 적합합니다. 또한, 수소화 분해 공정을 넘어 다른 화학 산업 분야에서도 적용 가능한 혁신적이고 효과적인 최적화 솔루션을 제시할 수 있습니다.",
  "rd6.c":"강화 학습을 통한 수소화 분해공정 최적화",
  "rd7.t":"화학 산업에서 스팀 메탄 개질기(SMR)를 위한 수학적 모델링과 AI 통합 접근법",
  "rd7.p":"스팀 메탄 개질기(SMR)는 천연가스를 활용한 H₂ 생산에서 핵심적인 역할을 담당하여 화학 산업에서 매우 중요합니다. 본 개발에서는 SMR의 성능을 개선하기 위해 수학적 모델링과 AI를 결합한 통합 접근법을 개발하였습니다. 우선 SMR 공정을 위한 정밀한 동적 수학 모델을 개발하고 검증하여 온도, 압력, 몰분율 및 열 유속의 예측 신뢰성을 입증했습니다. 이후 이 모델을 기반으로 촉매 파라미터와 운전 조건을 다양하게 변경하며 성능 데이터를 생성하였으며, 주성분 분석(PCA)을 통해 AI 모델이 운전 조건과 예측된 출력값 사이의 관계를 정확하게 학습했습니다. 개발된 AI 모델은 기존의 동적 시뮬레이션 대비 현저히 짧은 계산 시간으로 높은 예측 정확도를 달성하였습니다. 본 방법론은 H₂ 생산을 위한 온라인 운전 최적화 및 시스템 설계를 낮은 계산 비용으로 수행할 수 있게 해주므로, 산업 현장에서 실질적인 가치를 제공합니다.",
  "rd7.c":"SMR 공정에 대한 동적 모델과 AI 모델 결과 비교",
  "rd8.t":"분리공정과 통합된 흡착강화증기메탄 개질공정(SESMR)을 통한 저탄소 H₂ 생산을 위한 AI 기반 최적화",
  "rd8.p":"본 연구에서는 분리 공정과 통합된 흡착 강화 증기 메탄 개질(SESMR) 공정을 활용하여 저탄소 H₂ 생산을 위한 AI 기반 최적화 모델을 개발했습니다. 이 접근법은 최적화 및 공정 제어의 단순화, 흡착제-촉매 개발을 위한 실질적인 지침 제공, 그리고 정확한 예측을 위한 AI의 잠재력을 극대화하는 데 초점을 맞추고 있습니다. 통합 공정은 순환 유동층(CFB), 압력 스윙 흡착(PSA) 및 기타 유닛으로 구성됩니다. 민감도 분석 및 주요변수 선택을 통해 목표와 변수 관계를 명확히 하였으며, 이를 기반으로 SESMR 중심의 AI 최적화 모델을 구축했습니다. 전통적인 SMR 공정에 비해 고순도 H₂ 생산 및 CO₂ 포집을 위한 비용을 15% 절감 가능함을 제시하였습니다. 이러한 결과는 통합 SESMR 공정의 운영, 최적화 및 제어에 기여하며 복잡한 공정에서 흡착제 및 촉매 개발에 유의미한 시사점을 제공합니다.",
  "rd8.c":"ANN 기반 SESMR 공정 최적화 및 결과",
  "rd9.t":"다성분 n-파라핀 분리를 위한 상업용 규모 SMB의 AI 모델",
  "rd9.p":"연구는 등유로부터 C₁₀-C₁₄ n-파라핀 다성분 혼합물을 분리하기 위한 모의 이동층 크로마토그래피(SMB) 공정의 성능 분석 및 최적화를 위해 AI 모델을 개발했습니다. 원료 조성 및 운전 변수의 복잡성을 해결하고자, 실제 산업 데이터를 활용한 데이터 기반 AI 기법과 수학적 동적 모델을 결합하여 SMB 공정의 성능을 평가하였습니다. 개발된 동적 모델의 분석 결과, 각 영역의 역류비를 최적화하여 회수율 개선 및 효과적인 불순물 제거를 위해 전략을 제공하였습니다. 또한, 실험 데이터의 한계성을 보완하기 위해 수학적 모델과 AI 모델의 통합적인 활용을 권장했습니다. 아울러 SMB 공정 전체 대상 엑서지 분석을 통해 개선 방안을 제안하였습니다. 이 결과는 화학공장의 SMB 성능 향상을 위한 설계 및 운전 지침 개발에 기여했다는 의의가 있습니다. 본 결과는 정밀화학사에 제공되었습니다.",
  "rd9.c":"n-파라핀 SMB 흡착 챔버의 구성 및 예측 불순물의 산점도",
  "rd10.t":"제너릭 모델을 통한 다양한 베드 반응기의 CO₂-메탄올 전환공정 설계지침",
  "rd10.p":"제너릭 모델 개발을 통해 CO₂에서 메탄올로의 전환(CTM) 공정에 대한 새로운 반응기 설계 가이드라인을 제안한 연구입니다. 상업적으로 활용 가능한 다양한 BR(Bed Reactor)을 포함한 분석을 통해 다양한 최적 운전 조건을 결정하였습니다. 각 BR은 각기 다른 최적 조건을 가지고 있었으며, 전체 CTM 공정은 특정 반응기 압력 및 온도 값에서 비용이 최소화 된다는 것을 입증했습니다. 이 가이드라인은 CTM 공정 설계, 운전 및 의사 결정에 대한 실용적인 지침을 제공하며, BR 모델은 다른 CO₂ 활용 공정에도 활용 가능합니다.",
  "rd10.c":"재료 비용에 따른 CO₂ 공급 속도 대비 CTM 공정 설계를 위한 적합 반응기 선정 구간",
  "rd11.t":"분리막 일체형 촉매유동층 반응기를 이용한 CO₂의 메탄올 전환 신공정 개발",
  "rd11.p":"본 개발에서는 분리 장치와 통합된 촉매 유동층 반응기를 사용하여 습식 CO₂를 메탄올로 전환하는 혁신적인 공정을 위한 AI 모델 및 최적화 시스템을 개발하였습니다. 탄소 중화를 위한 대규모 친환경 공정의 필요성이 높아짐에 따라, 개발된 공정 모델은 효율적이고 매력적인 해결 방안을 제시합니다. AI 모델을 활용한 최적화 방법을 통해 공정 성능을 정밀하게 예측하고, 계산 비용을 현저히 감소시킬 수 있었습니다.",
  "rd11.c":"AI를 이용한 SMR 공정의 운전 조건 최적화",
  "rd12.t":"고체 추진제 연소의 동적 거동 및 성능 예측을 위한 AI 기반 대리모델",
  "rd12.p":"이 개발은 수학적 모델과 AI 대리 모델을 이용하여 고체 추진제 연소의 동적 거동 및 성능 예측에 중점을 두고 있습니다. 엄격한 수학적 모델은 계산 복잡성으로 인해 실제 응용이 제한적입니다. AI 대리 모델은 이러한 한계를 해결하기 위해 개발되었으며, 연소의 동적 거동을 정확하고 신속하게 예측합니다. 대리 모델은 계산 속도 측면에서 수학적 동적 모델 대비 수백 배 높은 효율성을 달성했습니다. 본 결과는 국방 관련 기업에 제공되었습니다.",
  "rd12.c":"AI 대리모델을 이용한 고체 추진제 연소의 동적 거동 결과",
  "rd13.t":"가스 호흡 보호 시스템을 위한 CFD 기반 첨단 카트리지 설계",
  "rd13.p":"방독면은 유해물질로부터 사람을 보호하는 데 중요한 역할을 하며, 차세대 가스호흡기용 첨단 카트리지의 개발이 요구되고 있습니다. 프로토타입 카트리지를 이용하여 CFD 모델을 검증하였으며, 세 가지 설계에 대하여 호흡 저항 및 파과시간을 비교하였고, 가상현실(VR) 시스템을 사용하여 카트리지의 성능을 시각적으로 평가했습니다. 가스호흡기 카트리지의 개발 및 최적화에 CFD 모델을 활용하여 착용감, 보호성 및 전반적인 설계 효율성을 향상시켰습니다.",
  "rd13.c":"VR 시스템을 활용한 가스 카트리지 형상 및 내부 가스 흐름 시각화 결과",
  "rd14.t":"CO₂ 포집 및 메탄올 전환 공정의 기술·경제·환경적 성능 향상을 위한 고급 공정 통합 및 AI 기반 최적화 솔루션",
  "rd14.p":"AI 기반 최적화로 고도화된 CO₂ 포집 및 메탄올 전환 통합 공정(CCTM)은 에너지 소비, 생산 비용 및 CO₂ 배출 저감 측면에서 획기적인 개선 효과를 달성하였습니다. 본 공정은 폐열, 오프가스, 용수 등을 재활용하는 첨단 통합 설계를 통해 에너지 효율을 14.73-16.30% 향상시키고, 생산 비용을 0.81-1.28% 절감하며, 순 CO₂ 배출 저감률을 3.13-3.38% 증가시켰습니다. AI 모델 기반의 최적화를 통해 CO₂ 포집률 92.53%와 메탄올 생산 비용을 $8.21/tMeOH 절감할 수 있습니다. 이 접근법은 메탄올 생산 분야의 탄소 중립 목표를 달성하는 데 실질적이고 지속 가능한 솔루션을 제공합니다.",
  "rd14.c":"고도화된 CO₂ 포집 및 메탄올 전환 통합 공정도 및 AI 기반 최적화",
  "rd15.t":"고압 합성가스를 위한 스트리퍼 없는 혼합 아민 CO₂ 포집 공정",
  "rd15.p":"본 개발에서는 고압 합성가스를 대상으로, 기존의 스트리퍼를 사용하지 않고 혼합 MDEA/PZ 용제를 활용한 새로운 CO₂ 포집 공정을 제안했습니다. 해당 공정은 스트리퍼를 저압 플래시 컬럼으로 대체하여, 373.15 K 이하의 저온에서 용매를 재생할 수 있어 에너지 소비를 효과적으로 줄입니다. AI 모델과 결합된 최적화기법의 결과, 열 부하는1.881 GJ/tCO₂로, 기존 공정보다 현저히 낮은 수준을 달성했습니다. 경제성 분석에서는 폐열 회수를 적용할 경우 비용이 $32.89/tCO₂로 산정되어, 수소 생산 공정에서의 비용 효율적인 CO₂ 포집 기술로서의 가능성을 제시합니다.",
  "rd15.c":"혼합 아민 CO₂ 포집 공정도 및 AI 기반 최적화 개요",
  "rd16.t":"스팀 메탄 개질기(SMR)로부터의 블루 H₂ 생산을 위한 아민 기반 흡수 공정의 연소 전 CO₂ 포집",

  "rd16.c":"SMR 합성가스 내 CO₂ 포집을 위한 아민 기반 흡수 공정 및 90% 포집 조건에서 운전 조건 최적화",
