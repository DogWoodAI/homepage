<body data-popup="off">
<div id="site-header"></div>

<section class="page-hero"><div class="container"><h1 data-i18n="nav.about"></h1></div></section>

<!-- ====================== COMPANY ====================== -->
<section class="section anchor-sec" id="company" style="padding-bottom:56px">
  <div class="container">
    <h2 class="h-lg reveal" style="margin-bottom:26px" data-i18n="nav.company"></h2>
    <div class="split">
      <div class="reveal">
        <span class="eyebrow" data-i18n="company.intro.t"></span>
        <h3 class="h-md" data-i18n="company.h1"></h3>
        <p class="lead" style="margin:16px 0;font-size:1.02rem" data-i18n="company.intro.p1"></p>
        <p class="muted" data-i18n="company.intro.p2"></p>
        <p class="muted" style="margin-top:14px" data-i18n="company.intro.p3"></p>
      </div>
      <div class="split-media reveal d1">
        <div class="principle-panel">
          <div class="principle-panel-head">
            <span class="eyebrow" data-i18n="company.foundation.kicker"></span>
            <h3 data-i18n="company.foundation.h"></h3>
          </div>
          <div class="principle-list">
            <div class="principle-item">
              <span>01</span>
              <div>
                <b data-i18n="company.v1.t"></b>
                <p data-i18n="company.v1.d"></p>
              </div>
            </div>
            <div class="principle-item">
              <span>02</span>
              <div>
                <b data-i18n="company.v2.t"></b>
                <p data-i18n="company.v2.d"></p>
              </div>
            </div>
            <div class="principle-item">
              <span>03</span>
              <div>
                <b data-i18n="company.v3.t"></b>
                <p data-i18n="company.v3.d"></p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="section-head left reveal company-proof-head">
      <span class="eyebrow" data-i18n="company.results.t"></span>
      <h3 class="h-md" data-i18n="company.results.h"></h3>
    </div>
    <div class="grid grid-3 company-proof-grid">
      <div class="tile reveal"><span class="tag">01</span><h3 data-i18n="company.r1.t"></h3><p data-i18n="company.r1.d"></p></div>
      <div class="tile reveal d1"><span class="tag">02</span><h3 data-i18n="company.r2.t"></h3><p data-i18n="company.r2.d"></p></div>
      <div class="tile reveal d2"><span class="tag">03</span><h3 data-i18n="company.r3.t"></h3><p data-i18n="company.r3.d"></p></div>
    </div>

    <h3 class="h-md reveal" style="margin:56px 0 22px" data-i18n="company.lead.t"></h3>
    <div class="leadership-stack">
      <article class="leader-row leader-row--photo reveal">
        <div class="leader-photo"><img src="assets/about/ceo.jpg" alt="CEO"></div>
        <div class="leader-content">
          <h3 data-i18n="company.ceo.name"></h3>
          <div class="role" data-i18n="company.ceo.role"></div>
          <ul>
            <li data-i18n="company.ceo.l1"></li><li data-i18n="company.ceo.l2"></li>
            <li data-i18n="company.ceo.l3"></li><li data-i18n="company.ceo.l4"></li>
            <li data-i18n="company.ceo.l5"></li><li data-i18n="company.ceo.l6"></li>
            <li data-i18n="company.ceo.l7"></li>
          </ul>
        </div>
      </article>
      <article class="leader-row leader-row--text reveal d1">
        <div class="leader-content">
          <h3 data-i18n="company.cto.name"></h3>
          <div class="role" data-i18n="company.cto.role"></div>
          <ul>
            <li data-i18n="company.cto.l1"></li><li data-i18n="company.cto.l2"></li>
            <li data-i18n="company.cto.l3"></li><li data-i18n="company.cto.l4"></li>
            <li data-i18n="company.cto.l5"></li><li data-i18n="company.cto.l6"></li>
          </ul>
        </div>
      </article>
    </div>

    <h3 class="h-md reveal" style="margin:56px 0 22px" data-i18n="company.tl.t"></h3>
    <div class="timeline" style="max-width:760px">
      <div class="tl-item reveal"><div class="tl-date" data-i18n="company.tl1.d"></div><h4 data-i18n="company.tl1.t"></h4><p data-i18n="company.tl1.p"></p></div>
      <div class="tl-item reveal"><div class="tl-date" data-i18n="company.tl2.d"></div><h4 data-i18n="company.tl2.t"></h4><p data-i18n="company.tl2.p"></p></div>
      <div class="tl-item reveal"><div class="tl-date" data-i18n="company.tl3.d"></div><h4 data-i18n="company.tl3.t"></h4><p data-i18n="company.tl3.p"></p></div>
      <div class="tl-item reveal"><div class="tl-date" data-i18n="company.tl4.d"></div><h4 data-i18n="company.tl4.t"></h4><p data-i18n="company.tl4.p"></p></div>
    </div>
  </div>
</section>

<!-- ====================== INDUSTRIES ====================== -->
<section class="section section--soft anchor-sec" id="industries">
  <div class="container">
    <h2 class="h-lg reveal" style="margin-bottom:26px" data-i18n="nav.industries"></h2>
    <div class="split">
      <div class="reveal">
        <span class="eyebrow" data-i18n="ind.problem.t"></span>
        <h3 class="h-md" data-i18n="ind.h1"></h3>
        <p style="margin:16px 0;color:#374151" data-i18n="ind.problem.p1"></p>
        <p class="muted" data-i18n="ind.problem.p2"></p>
        <p class="muted" style="margin-top:14px" data-i18n="ind.problem.p3"></p>
      </div>
      <div class="split-media reveal d1">
        <div class="media has-img"><img src="assets/about/industry-01.jpg" alt="Petrochemical plant"></div>
      </div>
    </div>


    <div class="split" style="margin-top:56px">
      <div class="split-media reveal">
        <div class="media has-img"><img src="assets/about/industry-02.jpg" alt="Chemical process plant"></div>
      </div>
      <div class="reveal d1">
        <span class="eyebrow" data-i18n="ind.sol.t"></span>
        <h3 class="h-md" data-i18n="ind.sectors.t"></h3>
        <p style="margin:16px 0;color:#374151" data-i18n="ind.sol.p"></p>
        <p class="muted" data-i18n="ind.sol.p2"></p>
        <div class="industry-portfolio">
          <div class="portfolio-row portfolio-row--core">
            <div class="portfolio-label">
              <b data-i18n="ind.core.t"></b>
            </div>
            <div class="sector-pill-grid">
              <span class="sector-pill" data-i18n="ind.s1"></span>
              <span class="sector-pill" data-i18n="ind.s2"></span>
              <span class="sector-pill" data-i18n="ind.s3"></span>
            </div>
          </div>
          <div class="portfolio-row portfolio-row--expand">
            <div class="portfolio-label">
              <b data-i18n="ind.expand.t"></b>
            </div>
            <div class="sector-pill-grid">
              <span class="sector-pill" data-i18n="ind.s4"></span>
              <span class="sector-pill" data-i18n="ind.s5"></span>
              <span class="sector-pill" data-i18n="ind.s6"></span>
              <span class="sector-pill" data-i18n="ind.s7"></span>
              <span class="sector-pill" data-i18n="ind.s8"></span>
              <span class="sector-pill" data-i18n="ind.s9"></span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- ====================== CUSTOMERS ====================== -->
<section class="section anchor-sec" id="customers">
  <div class="container">
    <h2 class="h-lg reveal" style="margin-bottom:26px" data-i18n="nav.customers"></h2>

    <div class="section-head left reveal customer-head">
      <span class="eyebrow" data-i18n="cust.bc"></span>
      <h3 class="h-md" data-i18n="cust.h1"></h3>
      <p class="lead" style="margin-top:16px" data-i18n="cust.p1"></p>
    </div>

    <div class="split customer-split">
      <div class="split-media reveal">
        <div class="media has-img"><img src="assets/about/customer-01.jpg" alt="Refinery complex"></div>
      </div>
      <div class="reveal d1">
        <span class="eyebrow" data-i18n="cust.scale.t"></span>
        <h3 class="h-md" data-i18n="cust.scale.h"></h3>
        <p style="margin:16px 0;color:#374151" data-i18n="cust.p2"></p>
        <p class="muted" data-i18n="cust.p3"></p>
        <div class="customers-cta">
          <a href="news" class="btn customers-contact" data-i18n="nav.news"></a>
        </div>
      </div>
    </div>

    <div class="grid grid-3 customer-roadmap" style="margin-top:40px">
      <div class="tile reveal"><span class="tag">01</span><h3 data-i18n="cust.b1.t"></h3><p data-i18n="cust.b1.d"></p></div>
      <div class="tile reveal d1"><span class="tag">02</span><h3 data-i18n="cust.b2.t"></h3><p data-i18n="cust.b2.d"></p></div>
      <div class="tile reveal d2"><span class="tag">03</span><h3 data-i18n="cust.b3.t"></h3><p data-i18n="cust.b3.d"></p></div>
    </div>
  </div>
</section>

<div id="site-footer"></div>
