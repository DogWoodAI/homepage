<body data-popup="off">
<div id="site-header"></div>

<section class="page-hero"><div class="container"><h1 data-i18n="nav.ip"></h1></div></section>

<section class="section anchor-sec" id="patent" style="padding-bottom:48px">
  <div class="container">
    <h2 class="h-lg reveal" style="margin-bottom:22px" data-i18n="ipg.patH"></h2>
    <div class="table-wrap ip-table reveal">
      <table>
        <thead><tr><th style="width:56px"></th><th data-i18n="pat.col1"></th><th style="width:42%" data-i18n="ipg.noteH"></th></tr></thead>
        <tbody id="patentRows"></tbody>
      </table>
    </div>
  </div>
</section>

<section class="section anchor-sec" id="publications" style="padding-top:24px">
  <div class="container">
    <h2 class="h-lg reveal" style="margin-bottom:8px" data-i18n="ipg.pubH"></h2>
    <p class="ip-note reveal" data-i18n="ipg.real"></p>
    <div class="table-wrap ip-table reveal">
      <table>
        <thead><tr>
          <th style="width:56px"></th><th data-i18n="pat.col1"></th>
          <th style="width:170px" data-i18n="ipg.journal"></th>
          <th style="width:80px" data-i18n="ipg.date"></th>
          <th style="width:150px" data-i18n="ipg.rank"></th>
        </tr></thead>
        <tbody id="publicationRows"></tbody>
      </table>
    </div>
  </div>
</section>

<div id="site-footer"></div>
<script src="js/translations.js"></script>
<script src="js/page-data.js"></script>
<script>
(function(){
  function render(data){
    function byOrder(a,b){ return Number(b.order || 0) - Number(a.order || 0); }
    var patRoot = document.getElementById("patentRows");
    if(patRoot){
      patRoot.innerHTML = (data.patents || []).slice().sort(byOrder).map(function(p, i){
        return '<tr><td class="c"><b>'+(i+1)+'</b></td><td data-i18n="'+p.titleKey+'"></td><td data-i18n="'+p.noteKey+'"></td></tr>';
      }).join("");
    }
    var pubRoot = document.getElementById("publicationRows");
    if(pubRoot){
      pubRoot.innerHTML = (data.publications || []).slice().sort(byOrder).map(function(p, i){
        var no = (p.realData ? "*" : "") + (i+1);
        return '<tr><td class="c"><b>'+no+'</b></td><td>'+p.title+'</td><td class="c">'+p.journal+'</td><td class="c">'+p.date+'</td><td class="c">'+p.rank+'</td></tr>';
      }).join("");
    }
  }
  PageData.load("data/ip-papers.json", render);
})();
</script>
<script src="js/app.js"></script>
