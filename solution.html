    <h2 class="reveal" data-i18n="sol.h1"></h2>
    <div class="dwp">
      <div class="dwp-card dwp-col reveal">

      </div>
      <div class="dwp-card reveal d1">
        <div class="wheel"><img src="assets/solution/dogwoodpro-modules.png" alt="DogWoodPro modules" width="835" height="842" loading="lazy"></div>
        <h3 data-i18n="slp.mod"></h3>
        <p data-i18n="slp.modp"></p>
        <p class="arrow" data-i18n="slp.modp2"></p>

  <div id="solList"></div>

<div id="site-footer"></div>
<script src="js/translations.js"></script>
<script src="js/page-data.js"></script>
<script>
(function(){
  function li(key){ return '<li data-i18n="'+key+'"></li>'; }
  function hasText(key){
    return !!((window.I18N.en && window.I18N.en[key]) || (window.I18N.ko && window.I18N.ko[key]));
  }
  function featureList(m){
    return (m.features || [1,2,3]).map(function(n){ return m.k+'.f'+n; }).filter(hasText).map(li).join("");
  }
  function bodyBlock(m){
    if(m.body === "paragraphs"){
      return '<div class="solution-copy">'+
        '<p data-i18n="'+m.k+'.p1"></p>'+
        '<p data-i18n="'+m.k+'.p2"></p>'+
      '</div>';
    }
    return '<span class="uh" data-i18n="g.features"></span>'+
      '<ul class="dash-list">'+featureList(m)+'</ul>'+
      '<span class="uh" data-i18n="g.benefits"></span>'+
      '<ul class="dash-list">'+li(m.k+'.b1')+li(m.k+'.b2')+li(m.k+'.b3')+'</ul>';
  }
  function diagram(img, size, cls){
    var dims = size ? ' width="'+size[0]+'" height="'+size[1]+'"' : '';
    return '<div class="diagram '+(cls || '')+' reveal d1"><img src="assets/solution/'+img+'" alt=""'+dims+' loading="lazy"></div>';
  }
  function render(data){
    document.getElementById("solList").innerHTML = data.modules.map(function(m){
      return '<section class="mod anchor-sec" id="'+m.id+'">'+
        '<h2 class="reveal"><span data-i18n="'+m.h+'"></span>: <span data-i18n="'+m.tag+'"></span></h2>'+
        '<div class="reveal">'+bodyBlock(m)+'</div>'+
        diagram(m.img, m.size)+(m.img2 ? diagram(m.img2, m.size2, 'diagram--secondary') : '')+
      '</section>';
    }).join("");
  }
  PageData.load("data/solution.json", render);
})();
</script>
<script src="js/app.js"></script>
