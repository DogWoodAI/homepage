<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DogWoodAI</title>
<meta name="description" content="DogWoodAI builds tailor-made AI for real-time prediction, simulation, optimization and safety analysis of manufacturing plants.">
<link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-icon-180x180.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
<link rel="shortcut icon" href="favicon/favicon.ico">
<link rel="manifest" href="favicon/manifest.json">
<meta name="msapplication-TileColor" content="#ffffff">
<meta name="msapplication-TileImage" content="favicon/ms-icon-144x144.png">
<meta name="theme-color" content="#ffffff">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body data-page="index.html">
<div id="site-header"></div>

<div class="fp-wrap" id="fpWrap">

  <!-- PANEL 1 · HERO -->
  <section class="hero panel panel-black" id="hero">
    <video class="hero-video" autoplay muted loop playsinline poster="assets/video/mp4_bg.jpg">
      <source src="assets/video/ad01.mp4" type="video/mp4">
    </video>
    <div class="hero-overlay"></div>
    <div class="hero-inner">
      <img class="hero-logo" src="assets/main/visual-logo.png" alt="DogWoodAI">
      <h1 class="hero-tagline" data-i18n="home.hero.tagline"></h1>
    </div>
    <div class="hero-3c">
      <div class="wrap">
        <dl><dt data-i18n="home.3c.c1.t"></dt><dd data-i18n="home.3c.c1.d"></dd></dl>
        <dl class="line"><dt data-i18n="home.3c.c2.t"></dt><dd data-i18n="home.3c.c2.d"></dd></dl>
        <dl><dt data-i18n="home.3c.c3.t"></dt><dd data-i18n="home.3c.c3.d"></dd></dl>
      </div>
    </div>
  </section>

  <!-- PANEL 2 · BUSINESS PROJECT (1) -->
  <section class="panel panel-dark" id="projects1">
    <div class="container">
      <div class="section-head reveal" style="margin-bottom:30px">
        <span class="eyebrow" data-i18n="home.proj.eyebrow"></span>
        <h2 class="h-lg" data-i18n="home.proj.title"></h2>
      </div>
      <div class="proj-grid" id="projGrid1"></div>
    </div>
  </section>

  <!-- PANEL 3 · BUSINESS PROJECT (2) -->
  <section class="panel panel-black" id="projects2">
    <div class="container">
      <div class="section-head reveal" style="margin-bottom:30px">
        <span class="eyebrow" data-i18n="home.proj.eyebrow"></span>
        <h2 class="h-lg" data-i18n="home.proj.sub"></h2>
      </div>
      <div class="proj-grid" id="projGrid2"></div>
    </div>
  </section>

  <!-- PANEL 4 · VIDEO -->
  <section class="panel panel-video" id="video">
    <div class="container">
      <div class="section-head reveal">
        <span class="eyebrow" data-i18n="home.video.eyebrow"></span>
        <h2 class="h-lg" data-i18n="home.video.title"></h2>
        <p class="lead" data-i18n="home.video.sub"></p>
      </div>
      <div class="fp-video reveal">
        <video controls preload="none" data-globe poster="assets/video/mp4_bg.jpg">
          <source src="assets/video/dogwood_01.mp4" type="video/mp4">
        </video>
      </div>
    </div>
  </section>

  <!-- PANEL 5 · CONTACT -->
  <section class="panel panel-dark" id="contact">
    <div class="container">
      <div class="section-head reveal" style="margin-bottom:6px"><h2 class="h-lg" data-i18n="home.contact.h"></h2></div>
      <div class="contact-card reveal">
        <div class="contact-wrap">
          <div class="contact-info">
            <div class="ci-item">
              <span class="ci-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s-7-6.5-7-11a7 7 0 0 1 14 0c0 4.5-7 11-7 11Z"/><circle cx="12" cy="10" r="2.4"/></svg></span>
              <div><b data-i18n="contact.addr.l"></b><span data-i18n="contact.addr.v"></span></div>
            </div>
            <div class="ci-item">
              <span class="ci-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3-8.7A2 2 0 0 1 4.1 2H7a2 2 0 0 1 2 1.7c.1 1 .4 1.9.7 2.8a2 2 0 0 1-.5 2.1L8 9.9a16 16 0 0 0 6 6l1.3-1.3a2 2 0 0 1 2.1-.4c.9.3 1.8.5 2.8.6a2 2 0 0 1 1.8 2.1Z"/></svg></span>
              <div><b data-i18n="contact.phone.l"></b><span>+82 10 6278 0184</span></div>
            </div>
            <div class="ci-item">
              <span class="ci-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 6 10-6"/></svg></span>
              <div><b data-i18n="contact.email.l"></b><span>dogwoodai@dogwoodai.com</span></div>
            </div>
          </div>
          <form class="contact-form" id="contactForm">
            <div class="form-row">
              <div class="field"><label data-i18n="contact.f.name"></label><input type="text" data-i18n-ph="contact.f.name.ph" required></div>
              <div class="field"><label data-i18n="contact.f.email"></label><input type="email" data-i18n-ph="contact.f.email.ph" required></div>
            </div>
            <div class="field">
              <label data-i18n="contact.f.msg"></label>
              <textarea maxlength="500" data-i18n-ph="contact.f.msg.ph" required></textarea>
              <div class="char-count">0 / 500</div>
            </div>
            <label class="consent"><input type="checkbox" required><span data-i18n="contact.consent"></span></label>
            <button type="submit" class="btn btn-primary btn-lg" style="width:100%;justify-content:center" data-i18n="contact.submit"></button>
          </form>
        </div>
      </div>
    </div>
  </section>

  <!-- PANEL 6 · FOOTER -->
  <section class="panel panel-foot" id="end">
    <div id="site-footer"></div>
  </section>

</div>

<div class="fp-dots" id="fpDots"></div>

<script src="js/translations.js"></script>
<script src="js/app.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function(){
  /* Business Project cards — real thumbnails + real titles (matches the live site) */
  function projCard(i){
    var n = (i < 10 ? "0" : "") + i;
    return '<a class="proj-box reveal" href="projects">'+
      '<div class="pb-img"><img src="assets/main/slider_thumb'+n+'.jpg" alt="" loading="lazy"></div>'+
      '<div class="pb-body"><h3 data-i18n="proj.p'+i+'.t"></h3>'+
      '<span class="pb-more" data-i18n="home.proj.click"></span></div></a>';
  }
  document.getElementById("projGrid1").innerHTML = [1,2,3,4,5,6].map(projCard).join("");
  document.getElementById("projGrid2").innerHTML = [7,8,9].map(projCard).join("");

  window.DW.setLang(window.DW.getLang());
  window.DW.observeReveals();
});
</script>
<script src="js/fullpage.js"></script>
</body>
</html>
