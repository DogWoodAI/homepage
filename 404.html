<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DogWoodAI</title>
<meta name="robots" content="noindex">
<script>
(function(){
  "use strict";
  var parts = location.pathname.split("/").filter(Boolean);
  var base = "/";
  if(/\.github\.io$/i.test(location.hostname) && parts.length){
    base = "/" + parts[0] + "/";
  }else{
    var homepageIndex = parts.map(function(part){ return part.toLowerCase(); }).indexOf("homepage");
    if(homepageIndex >= 0) base = "/" + parts.slice(0, homepageIndex + 1).join("/") + "/";
  }
  document.write('<base href="' + base + '">');
  window.DW_404_BASE = base;
})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script>
(function(){
  "use strict";

  var parts = location.pathname.split("/").filter(Boolean);
  var base = window.DW_404_BASE || "/";
  var baseParts = base.split("/").filter(Boolean);
  var rest = parts.slice(baseParts.length);
  var lang = (rest[0] || "").toLowerCase();

  if((lang === "en" || lang === "kr") && rest.length === 1 && /\/$/.test(location.pathname)){
    location.replace(base + location.search + "#/" + lang);
    return;
  }
  window.DW_404_LANG = lang === "en" ? "en" : "kr";
})();
</script>
</head>
<body data-page="404.html" data-popup="off" data-quick="off">
<div id="site-header"></div>

<main class="not-found-page">
  <section class="not-found-panel">
    <p class="not-found-kicker">404</p>
    <h1 data-i18n="404.title"></h1>
    <p data-i18n="404.desc"></p>
    <div class="not-found-actions">
      <a class="btn btn-primary" href="index.html" data-i18n="404.home"></a>
      <a class="btn btn-outline" href="contact.html" data-i18n="404.contact"></a>
    </div>
  </section>
</main>

<div id="site-footer"></div>
<script src="js/translations.js"></script>
<script src="js/app.js"></script>
</body>
</html>
