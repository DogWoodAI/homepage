<body data-popup="off">
<div id="site-header"></div>

<section class="page-hero"><div class="container"><h1 data-i18n="nav.projects"></h1></div></section>

<div class="container">
  <div id="pjList"></div>
</div>

<div id="site-footer"></div>
<script src="js/translations.js"></script>
<script src="js/page-data.js"></script>
<script>
(function(){
  function render(data){
    var stackedSet = {};
    (data.stacked || []).forEach(function(n){ stackedSet[n] = true; });
    document.getElementById("pjList").innerHTML = data.projects.map(function(p,i){
      var k = "pj"+p.n;
      var stacked = !!stackedSet[p.n];
      var cls = "detail anchor-sec" + (stacked ? " detail--stacked" : (i%2 ? " rev" : ""));
      var media = p.video
        ? '<video class="native-video" width="'+p.size[0]+'" height="'+p.size[1]+'" controls preload="metadata"><source src="'+p.video+'" type="video/mp4"></video>'
        : '<img src="'+p.img+'" alt="" width="'+p.size[0]+'" height="'+p.size[1]+'" loading="lazy">';
      return '<section class="'+cls+'" id="project-'+p.n+'">'+
        '<div class="d-txt reveal">'+
          '<h2 data-i18n="proj.p'+p.n+'.t"></h2>'+
          '<span class="uh" data-i18n="g.challenge"></span>'+
          '<p data-i18n="'+k+'.c"></p>'+
          '<span class="uh" data-i18n="g.approachH"></span>'+
          '<p data-i18n="'+k+'.a"></p>'+
          '<span class="uh" data-i18n="g.value"></span>'+
          '<p data-i18n="'+k+'.v"></p>'+
        '</div>'+
        '<figure class="d-fig reveal d1">'+
          '<div class="frame">'+media+'</div>'+
          '<figcaption data-i18n="'+k+'.cap"></figcaption>'+
        '</figure>'+
      '</section>';
    }).join("");
  }
  PageData.load("data/projects.json", render);
})();
</script>
<script src="js/app.js"></script>
</body>
